<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe JF Plus — Gestion des Conteneurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBTXhNFj1REWyHjBpC4-qASfGRFjXlsGdQ&libraries=places"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1a0f;--bg2:#162416;--bg3:#1c2e1c;--card:#192619;
  --navy:#111927;--navy2:#1a2840;
  --green:#3d8b3d;--green2:#4fa84f;--green3:#6bc46b;--green-glow:rgba(79,168,79,0.15);
  --border:rgba(79,168,79,0.12);--border2:rgba(79,168,79,0.25);--border3:rgba(79,168,79,0.4);
  --text:#e2f0e2;--text2:#8fb88f;--text3:#5a7a5a;
  --amber:#c8891a;--amber-bg:rgba(200,137,26,0.12);--amber-text:#e8a83a;
  --red:#c0392b;--red-bg:rgba(192,57,43,0.12);--red-text:#e05a4a;
  --blue:#2980b9;--blue-bg:rgba(41,128,185,0.12);--blue-text:#5aabde;
  --purple:#8e44ad;--purple-bg:rgba(142,68,173,0.12);--purple-text:#b07fd4;
  --r:8px;--r2:12px;--r3:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.4);--shadow2:0 4px 24px rgba(0,0,0,0.5);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}

/* ── NAVBAR ── */
.navbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.nav-left{display:flex;align-items:center;gap:12px;min-width:0}
.nav-logo{height:32px;filter:brightness(0) invert(1);opacity:.9;flex-shrink:0}
.nav-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.nav-title{font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;padding:5px 12px;border-radius:var(--r);height:30px;display:flex;align-items:center;gap:5px;font-family:var(--font);transition:all .15s}
.nav-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}
.nav-btn.primary{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.nav-btn.primary:hover{background:var(--green2);border-color:var(--green2)}
.lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;height:30px}
.lang-btn{background:none;border:none;color:var(--text3);font-size:11px;font-weight:600;padding:0 10px;cursor:pointer;font-family:var(--font);transition:all .15s;letter-spacing:.05em}
.lang-btn.active{background:var(--green);color:#fff}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);flex-shrink:0;box-shadow:0 0 6px var(--green2)}
.db-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.db-dot.connecting{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-count{background:var(--green-glow);border:1px solid var(--border2);color:var(--green3);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}

/* ── BODY ── */
.body{padding:1.25rem 1.5rem;max-width:1280px;margin:0 auto}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;transition:border-color .15s}
.stat:hover{border-color:var(--border2)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.blue::before{background:var(--blue)}
.stat.green::before{background:var(--green2)}
.stat.amber::before{background:var(--amber)}
.stat.red::before{background:var(--red)}
.stat.purple::before{background:var(--purple)}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-val.blue{color:var(--blue-text)}
.stat-val.green{color:var(--green3)}
.stat-val.amber{color:var(--amber-text)}
.stat-val.red{color:var(--red-text)}
.stat-val.purple{color:var(--purple-text)}
.stat-sub{font-size:11px;color:var(--text3)}

/* ── TOOLBAR ── */
.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 10px 7px 32px;border-radius:var(--r);height:34px;font-family:var(--font);transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--green2)}
.search-wrap input::placeholder{color:var(--text3)}
select.filter{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:0 10px;border-radius:var(--r);height:34px;font-family:var(--font);cursor:pointer;transition:border-color .15s}
select.filter:focus{outline:none;border-color:var(--green2)}
select.filter option{background:var(--bg2)}
.toolbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:3px}
.tab{flex:1;font-size:12px;font-weight:500;padding:7px 12px;cursor:pointer;color:var(--text3);border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:6px;border:none;background:none;font-family:var(--font);transition:all .15s;letter-spacing:.02em}
.tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--text2);background:var(--green-glow)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--green2);transform:translateY(-1px);box-shadow:var(--shadow)}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.card:hover::after{opacity:1}
.card.available::after{background:var(--green2)}
.card.rented::after{background:var(--amber)}
.card.maintenance::after{background:var(--red)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cid{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.05em}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.badge.available{background:rgba(79,168,79,0.15);color:var(--green3);border:1px solid rgba(79,168,79,0.25)}
.badge.rented{background:var(--amber-bg);color:var(--amber-text);border:1px solid rgba(200,137,26,0.25)}
.badge.maintenance{background:var(--red-bg);color:var(--red-text);border:1px solid rgba(192,57,43,0.25)}
.card-size{font-size:24px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1}
.card-client{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:18px}
.card-addr{font-size:11px;color:var(--text3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.card-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.color-dot.green{background:#5a9e2f}
.color-dot.blue{background:#2980b9}
.color-dot.black{background:#666}
.color-dot.red{background:#c0392b}
.overdue-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--red-bg);color:var(--red-text);border:1px solid rgba(192,57,43,0.3);letter-spacing:.03em}
.due-tag{font-size:10px;color:var(--text3)}
.empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block;opacity:.4}
.empty-state p{font-size:14px;margin-bottom:4px;color:var(--text2)}
.empty-state small{font-size:12px}

/* ── MAP VIEW ── */
.map-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.map-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.map-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.map-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.map-row:last-child{border-bottom:none}
.map-row:hover{background:var(--bg2)}
.map-status{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-info{flex:1;min-width:0}
.map-id{font-size:13px;font-weight:600;color:var(--text);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.map-addr{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.map-client{font-size:11px;color:var(--text3);margin-top:1px}
.map-link{font-size:11px;color:var(--green3);text-decoration:none;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0}
.map-link:hover{color:var(--green2)}
.map-empty{padding:3rem;text-align:center;color:var(--text3)}
.map-legend{display:flex;gap:16px;padding:10px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.map-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow2)}
.modal-head{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .12s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.25rem 1.25rem 0;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-shrink:0;background:var(--bg2)}
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);font-family:var(--font);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green2)}
.field select option{background:var(--bg2)}
.field textarea{height:64px;resize:vertical;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-sep{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.btn{font-size:12px;font-weight:500;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);cursor:pointer;height:36px;display:flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s;letter-spacing:.02em}
.btn:hover{background:var(--bg3);border-color:var(--border3)}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green2);border-color:var(--green2)}
.btn.danger{color:var(--red-text);border-color:transparent;background:none}
.btn.danger:hover{background:var(--red-bg);border-color:rgba(192,57,43,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── AUTOCOMPLETE ── */
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--navy2);border:1px solid var(--border2);border-radius:var(--r);z-index:300;max-height:200px;overflow-y:auto;margin-top:2px;box-shadow:var(--shadow2)}
.autocomplete-item{padding:9px 12px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:var(--green-glow);color:var(--green3)}
.autocomplete-item small{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.pac-container{background:var(--navy2)!important;border:1px solid var(--border2)!important;border-radius:var(--r)!important;font-family:var(--font)!important;box-shadow:var(--shadow2)!important;margin-top:2px!important}
.pac-item{padding:8px 12px!important;color:var(--text)!important;border-top:1px solid var(--border)!important;font-size:13px!important;cursor:pointer!important}
.pac-item:hover{background:var(--green-glow)!important}
.pac-item-query{color:var(--green3)!important;font-size:13px!important}
.pac-matched{color:var(--green3)!important}

/* ── SIDE PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;backdrop-filter:blur(1px)}
.panel{position:fixed;top:0;right:0;height:100vh;width:100%;max-width:400px;background:var(--bg2);border-left:1px solid var(--border2);z-index:151;display:flex;flex-direction:column;box-shadow:var(--shadow2)}
.panel-head{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.panel-body{flex:1;overflow-y:auto;padding:1rem}
.panel-section{margin-bottom:1.5rem}
.panel-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.export-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.export-card:hover{border-color:var(--green2);background:var(--green-glow)}
.export-card i{font-size:22px;color:var(--green3)}
.export-card span{font-size:11px;font-weight:500;color:var(--text2)}
.export-card small{font-size:10px;color:var(--text3)}
.alert-rule{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.alert-rule-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .12s}
.alert-rule-del:hover{color:var(--red-text)}
.info-box{background:var(--blue-bg);border:1px solid rgba(41,128,185,.2);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--blue-text);margin-bottom:12px;line-height:1.5}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:var(--r);z-index:500;opacity:0;transition:all .2s;border:1px solid var(--border2);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(79,168,79,.4);background:rgba(79,168,79,.1)}
.toast.error{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.1)}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{background:var(--navy);border-top:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:2rem}
.footer-left{font-size:11px;color:var(--text3)}
.footer-right{font-size:11px;color:var(--green3);display:flex;align-items:center;gap:5px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .navbar{padding:0 1rem}
  .body{padding:1rem}
  .nav-title{display:none}
  .nav-count{display:none}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:20px}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <img class="nav-logo" src="https://ramassagededebris.com/wp-content/uploads/2022/12/logo-nav-2x.png" alt="Groupe JF Plus" onerror="this.style.display='none'">
    <div class="nav-divider"></div>
    <span class="nav-title" id="nav-title">Gestion des conteneurs</span>
  </div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <div style="display:flex;align-items:center;gap:5px;padding:0 4px">
      <span class="db-dot connecting" id="db-dot"></span>
      <span style="font-size:11px;color:var(--text3)" id="db-label">...</span>
    </div>
    <button class="icon-btn" onclick="loadAll()" title="Actualiser"><i class="ti ti-refresh"></i></button>
    <button class="icon-btn" onclick="openPanel()" title="Rapports & Alertes"><i class="ti ti-bell"></i></button>
    <span class="nav-count" id="nav-count"></span>
    <button class="nav-btn primary" id="btn-add" onclick="openAdd()">
      <i class="ti ti-plus" style="font-size:14px"></i>
      <span id="lbl-add">Ajouter</span>
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="body">

  <!-- STATS -->
  <div class="stats" id="stats"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-list" onclick="switchTab('list')">
      <i class="ti ti-layout-grid" style="font-size:14px"></i>
      <span id="lbl-tab-list">Conteneurs</span>
    </button>
    <button class="tab" id="tab-map" onclick="switchTab('map')">
      <i class="ti ti-map-pin" style="font-size:14px"></i>
      <span id="lbl-tab-map">Carte</span>
    </button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method,path,body){
  const r=await fetch(SB+'/rest/v1/'+path,{
    method,headers:{...H,'Prefer':method==='POST'?'return=representation':'return=minimal'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.hint||r.status);}
  if(r.status===204||method==='PATCH'||method==='DELETE')return null;
  return r.json();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadAll(){
  dbStatus('connecting');
  try{
    const [c,cl]=await Promise.all([
      api('GET','containers?order=container_id.asc&select=*'),
      api('GET','clients?order=name.asc&select=*')
    ]);
    containers=c||[];clients=cl||[];
    dbStatus('online');render();
  }catch(e){
    dbStatus('offline');
    // clients table may not exist yet — try containers only
    try{
      containers=await api('GET','containers?order=container_id.asc&select=*')||[];
      dbStatus('online');render();
    }catch(e2){toast(t().err+e2.message,'error');}
  }
}

  if(typeof s!=='string')return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function isOverdue(c){return c.status==='Rented'&&c.return_date&&new Date(c.return_date)<new Date();}
function toast(msg,type,dur){

  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',dur);
}

    if(fs&&c.size!==fs)return false;

    if(so==='overdue')return(isOverdue(b)?1:0)-(isOverdue(a)?1:0)||(ord[a.status]||0)-(ord[b.status]||0);
    if(so==='size')return a.size.localeCompare(b.size)||a.container_id.localeCompare(b.container_id);

// ── CLIENT AUTOCOMPLETE ───────────────────────────────────────────────────────
function setupClientAutocomplete(){
  const inp=document.getElementById('mClient');
  const list=document.getElementById('client-list');
  if(!inp||!list)return;
  inp.addEventListener('input',function(){
    const q=this.value.toLowerCase().trim();
    list.innerHTML='';
    if(!q||!clients.length){list.style.display='none';return;}
    const matches=clients.filter(c=>c.name.toLowerCase().includes(q)).slice(0,6);
    if(!matches.length){list.style.display='none';return;}
    list.style.display='block';
    list.innerHTML=matches.map((c,i)=>
      '<div class="autocomplete-item" onclick="selectClient('+i+',\''+c.name.replace(/'/g,"\\'")+'\')">'
        +san(c.name)
        +(c.phone||c.address?'<small>'+(c.phone?san(c.phone):'')+(c.phone&&c.address?' · ':'')+( c.address?san(c.address):'')+'</small>':'')
      +'</div>'
    ).join('');
    list._data=matches;
  });
  document.addEventListener('click',function(e){
    if(!inp.contains(e.target)&&!list.contains(e.target))list.style.display='none';
  });
}
function selectClient(i,name){
  const list=document.getElementById('client-list');
  const c=list._data&&list._data[i];
  if(!c)return;
  document.getElementById('mClient').value=c.name;
  if(c.phone)document.getElementById('mPhone').value=c.phone;
  if(c.address){
    document.getElementById('mAddress').value=c.address;
  }
  list.style.display='none';
  toast(t().clientHint,'success',2000);
}

function initPlacesAutocomplete(){
  const input=document.getElementById('mAddress');
  if(!input||!window.google)return;
  const ac=new google.maps.places.Autocomplete(input,{
    componentRestrictions:{country:['ca','us']},
    fields:['formatted_address']
  });
  ac.addListener('place_changed',function(){
    const p=ac.getPlace();
    if(p.formatted_address)input.value=p.formatted_address;
  });
}

function toggleRented(){
  document.getElementById('rentedFields').style.display=
    document.getElementById('mStatus').value==='Rented'?'block':'none';
}
function closeModal(){document.getElementById('mc').innerHTML='';}

async function doSave(oldId){
  const x=t();
  const status=document.getElementById('mStatus').value;
  const isNew=!editId;
  const btn=document.getElementById('saveBtn');
  if(!['Available','Rented','Maintenance'].includes(status))return;
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  const isRented=status==='Rented';
  const payload={
    status,
    client:isRented?(document.getElementById('mClient').value||'').trim():'',
    phone:isRented?(document.getElementById('mPhone').value||'').trim():'',
    address:isRented?(document.getElementById('mAddress').value||'').trim():'',
    rented_date:isRented?(document.getElementById('mRentDate').value||null):null,
    return_date:isRented?(document.getElementById('mReturn').value||null):null,
    notes:(document.getElementById('mNotes').value||'').trim(),
    updated_at:new Date().toISOString()
  };
  try{
    if(isNew){
      const nid=(document.getElementById('mId').value||'').trim();
      if(!nid){alert(x.idReq);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>'+x.addBtn;}return;}
      if(!/^[a-zA-Z0-9\-\_]+$/.test(nid)){alert(x.idInvalid);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>'+x.addBtn;}return;}
      if(containers.find(c=>c.container_id===nid)){alert(x.idExists);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>'+x.addBtn;}return;}
      payload.container_id=nid;
      payload.size=document.getElementById('mSize').value;
      payload.color=document.getElementById('mColor').value;
      await api('POST','containers',payload);
      // Save/update client record if rented
      if(isRented&&payload.client)await saveClient(payload);
      toast(x.added,'success');
    }else{
      await api('PATCH','containers?container_id=eq.'+encodeURIComponent(oldId),payload);
      if(isRented&&payload.client)await saveClient(payload);
      toast(x.saved,'success');
    }
    closeModal();await loadAll();
  }catch(e){
    toast(x.err+e.message,'error',4000);
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>'+(isNew?x.addBtn:x.save);}
  }
}

async function saveClient(payload){
  if(!payload.client)return;
  try{
    const existing=clients.find(c=>c.name.toLowerCase()===payload.client.toLowerCase());
    if(existing){
      await api('PATCH','clients?id=eq.'+existing.id,{
        phone:payload.phone||existing.phone,
        address:payload.address||existing.address,
        updated_at:new Date().toISOString()
      });
    }else{
      await api('POST','clients',{
        name:payload.client,
        phone:payload.phone||null,
        address:payload.address||null,
        created_at:new Date().toISOString(),
        updated_at:new Date().toISOString()
      });
    }
  }catch(e){}
}

async function doDelete(id){
  if(!confirm(t().delConfirm+id+' ?'))return;
  try{
    await api('DELETE','containers?container_id=eq.'+encodeURIComponent(id));
    toast(t().deleted,'success');closeModal();await loadAll();
  }catch(e){toast(t().err+e.message,'error',4000);}
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────────
function openPanel(){
  const x=t();
  const rules=JSON.parse(localStorage.getItem('jf_alerts')||'[]');
  document.getElementById('pc').innerHTML=
    '<div class="panel-overlay" onclick="closePanel()"></div>'+
    '<div class="panel">'+
      '<div class="panel-head">'+
        '<span class="panel-title"><i class="ti ti-bell" style="color:var(--green3)"></i>'+x.panelTitle+'</span>'+
        '<button class="modal-close" onclick="closePanel()">&#215;</button>'+
      '</div>'+
      '<div class="panel-body">'+

        '<div class="panel-section">'+
          '<div class="panel-section-title">'+x.expTitle+'</div>'+
          '<div class="export-grid">'+
            '<div class="export-card" onclick="exportPDF(\'all\')"><i class="ti ti-file-type-pdf"></i><span>'+x.expPdf+'</span><small>'+x.expAll+'</small></div>'+
            '<div class="export-card" onclick="exportCSV(\'all\')"><i class="ti ti-table-export"></i><span>'+x.expCsv+'</span><small>'+x.expAll+'</small></div>'+
            '<div class="export-card" onclick="exportPDF(\'rented\')"><i class="ti ti-file-type-pdf"></i><span>'+x.expPdf+'</span><small>'+x.expRented+'</small></div>'+
            '<div class="export-card" onclick="exportCSV(\'rented\')"><i class="ti ti-table-export"></i><span>'+x.expCsv+'</span><small>'+x.expRented+'</small></div>'+
            '<div class="export-card" onclick="exportPDF(\'overdue\')"><i class="ti ti-file-type-pdf"></i><span>'+x.expPdf+'</span><small>'+x.expOver+'</small></div>'+
            '<div class="export-card" onclick="exportCSV(\'overdue\')"><i class="ti ti-table-export"></i><span>'+x.expCsv+'</span><small>'+x.expOver+'</small></div>'+
          '</div>'+
        '</div>'+

        '<div class="panel-section">'+
          '<div class="panel-section-title">'+x.alertTitle+'</div>'+
          '<div class="info-box">'+x.alertInfo+'</div>'+
          '<div class="field" style="margin-bottom:8px">'+
            '<label>'+x.alertEmail+'</label>'+
            '<input type="email" id="alertEmail" placeholder="info@groupejfplus.com" maxlength="200" style="width:100%;background:var(--card);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;font-size:13px;font-family:var(--font)">'+
          '</div>'+
          '<button class="btn primary" style="width:100%;justify-content:center;margin-bottom:12px" onclick="addAlert()">'+
            '<i class="ti ti-plus"></i> '+x.alertAdd+
          '</button>'+
          (rules.length?
            rules.map((r,i)=>'<div class="alert-rule">'+
              '<div style="flex:1;min-width:0">'+
                '<div style="font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px">'+
                  '<i class="ti ti-mail" style="font-size:12px;color:var(--green3)"></i>'+san(r.email)+
                '</div>'+
                '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+(lang==='fr'?'Alertes actives':'Active alerts')+'</div>'+
              '</div>'+
              '<button class="alert-rule-del" onclick="removeAlert('+i+')"><i class="ti ti-trash" style="font-size:14px"></i></button>'+
            '</div>').join(''):
            '<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px">'+x.alertNone+'</div>'
          )+
        '</div>'+

      '</div>'+
    '</div>';
}
function closePanel(){document.getElementById('pc').innerHTML='';}
function addAlert(){
  const email=(document.getElementById('alertEmail').value||'').trim();
  if(!email||!email.includes('@')){toast(lang==='fr'?'Email invalide':'Invalid email','error');return;}
  const rules=JSON.parse(localStorage.getItem('jf_alerts')||'[]');
  if(rules.find(r=>r.email===email)){toast(lang==='fr'?'Déjà ajouté':'Already added','error');return;}
  rules.push({email,created:new Date().toISOString()});
  localStorage.setItem('jf_alerts',JSON.stringify(rules));
  toast(lang==='fr'?'Alerte activée!':'Alert enabled!','success');
  openPanel();
}
function removeAlert(i){
  const rules=JSON.parse(localStorage.getItem('jf_alerts')||'[]');
  rules.splice(i,1);localStorage.setItem('jf_alerts',JSON.stringify(rules));
  openPanel();
}
function checkOverdue(){
  const rules=JSON.parse(localStorage.getItem('jf_alerts')||'[]');
  if(!rules.length||!containers.length)return;
  const od=containers.filter(isOverdue);
  if(!od.length)return;
  const last=localStorage.getItem('jf_last_alert');
  if(last&&Date.now()-parseInt(last)<15*60*1000)return;
  localStorage.setItem('jf_last_alert',Date.now().toString());
  toast((lang==='fr'?'En retard: ':'Overdue: ')+od.map(c=>c.container_id).join(', '),'error',6000);
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function getList(filter){
  if(filter==='rented')return containers.filter(c=>c.status==='Rented');
  if(filter==='overdue')return containers.filter(isOverdue);
  return containers;
}
function exportPDF(filter){
  const x=t(),list=getList(filter);
  if(!list.length){toast(x.noResults,'error');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(17,25,39);doc.rect(0,0,297,22,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text('GROUPE JF PLUS',12,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(x.pdfTitle,100,14);
  doc.text(new Date().toLocaleDateString(lang==='fr'?'fr-CA':'en-CA'),245,14);
  doc.autoTable({
    startY:28,
    head:[['ID','Taille','Statut','Client','Adresse','Téléphone','Location','Retour','Notes']],
    body:list.map(c=>[c.container_id,c.size,c.status,c.client||'',c.address||'',c.phone||'',c.rented_date||'',c.return_date||'',c.notes||'']),
    styles:{fontSize:8,cellPadding:2.5},
    headStyles:{fillColor:[61,139,61],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,250,245]},
    columnStyles:{0:{fontStyle:'bold',fontFamily:'courier'}}
  });
  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150);
    doc.text(i+'/'+pages,148,205,{align:'center'});
    doc.text('© Groupe JF Plus Inc. — Confidentiel',12,205);
  }
  doc.save('groupejf-'+filter+'-'+new Date().toISOString().slice(0,10)+'.pdf');
  toast('PDF '+(lang==='fr'?'téléchargé':'downloaded')+'!','success');
  closePanel();
}
function exportCSV(filter){
  const list=getList(filter);
  if(!list.length){toast(t().noResults,'error');return;}
  const h=['ID','Taille','Statut','Client','Adresse','Telephone','Date location','Retour prevu','Couleur','Notes'];
  const rows=list.map(c=>[c.container_id,c.size,c.status,c.client||'',c.address||'',c.phone||'',c.rented_date||'',c.return_date||'',c.color||'',c.notes||'']);
  const csv=[h,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='groupejf-'+filter+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
  toast('CSV '+(lang==='fr'?'téléchargé':'downloaded')+'!','success');
  closePanel();
}

applyLang();loadAll();
setInterval(()=>{loadAll();checkOverdue();},30000);
