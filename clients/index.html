<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe JF Plus — Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" crossorigin>
<style>
.ti{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle}
.ti::before{content:'';display:block}
.ti-refresh::before{content:'↻';font-size:1.1em}
.ti-plus::before{content:'+';font-weight:700;font-size:1.1em}
.ti-search::before{content:'⌕';font-size:1.1em}
.ti-trash::before{content:'🗑';font-size:.85em}
.ti-edit::before{content:'✏️';font-size:.85em}
.ti-check::before{content:'✓';font-weight:700;font-size:1.1em}
.ti-database::before{content:'🗄';font-size:.85em}
.ti-user::before{content:'👤';font-size:.85em}
.ti-home::before{content:'⌂';font-size:1em}
.ti-file-invoice::before{content:'🧾';font-size:.85em}
.ti-phone::before{content:'📞';font-size:.85em}
.ti-mail::before{content:'✉';font-size:1em}
.ti-map-pin::before{content:'📍';font-size:.85em}
.ti-x::before{content:'×';font-weight:700;font-size:1.2em}

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1a0f;--bg2:#162416;--bg3:#1c2e1c;--card:#192619;
  --navy:#111927;--navy2:#1a2840;
  --green:#3d8b3d;--green2:#4fa84f;--green3:#6bc46b;--green-glow:rgba(79,168,79,0.15);
  --border:rgba(79,168,79,0.12);--border2:rgba(79,168,79,0.25);--border3:rgba(79,168,79,0.4);
  --text:#e2f0e2;--text2:#8fb88f;--text3:#5a7a5a;
  --amber:#c8891a;--amber-bg:rgba(200,137,26,0.12);--amber-text:#e8a83a;
  --red:#c0392b;--red-bg:rgba(192,57,43,0.12);--red-text:#e05a4a;
  --blue:#2980b9;--blue-bg:rgba(41,128,185,0.12);--blue-text:#5aabde;
  --r:8px;--r2:12px;--r3:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.4);--shadow2:0 4px 24px rgba(0,0,0,0.5);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}

.navbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.nav-left{display:flex;align-items:center;gap:12px;min-width:0}
.nav-logo{height:30px;filter:brightness(0) invert(1);opacity:.9;flex-shrink:0}
.nav-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.nav-title{font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;padding:5px 12px;border-radius:var(--r);height:30px;display:flex;align-items:center;gap:5px;font-family:var(--font);transition:all .15s;text-decoration:none}
.nav-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}
.nav-btn.primary{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.nav-btn.primary:hover{background:var(--green2);border-color:var(--green2)}
.lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;height:30px}
.lang-btn{background:none;border:none;color:var(--text3);font-size:11px;font-weight:600;padding:0 10px;cursor:pointer;font-family:var(--font);transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);flex-shrink:0;box-shadow:0 0 6px var(--green2)}
.db-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.db-dot.connecting{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

.body{padding:1.25rem 1.5rem;max-width:1280px;margin:0 auto}
.layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start}
@media(max-width:1000px){.layout{grid-template-columns:1fr}}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.blue::before{background:var(--blue)}.stat.green::before{background:var(--green2)}.stat.amber::before{background:var(--amber)}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-val.blue{color:var(--blue-text)}.stat-val.green{color:var(--green3)}.stat-val.amber{color:var(--amber-text)}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.panel-head{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}

.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 10px 7px 32px;border-radius:var(--r);height:34px;font-family:var(--font);transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--green2)}
.search-wrap input::placeholder{color:var(--text3)}
select.filter{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:0 10px;border-radius:var(--r);height:34px;font-family:var(--font);cursor:pointer}
select.filter:focus{outline:none;border-color:var(--green2)}
select.filter option{background:var(--bg2)}
.toolbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* CLIENT CARDS */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:14px}
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.client-card:hover{border-color:var(--green2);transform:translateY(-1px);box-shadow:var(--shadow)}
.client-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green2);opacity:0;transition:opacity .15s}
.client-card:hover::after{opacity:1}
.client-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-glow);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--green3);flex-shrink:0;font-family:var(--mono)}
.client-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px}
.client-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.badge.cat{background:var(--blue-bg);color:var(--blue-text);border:1px solid rgba(41,128,185,0.25)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);grid-column:1/-1}
.empty-state p{font-size:14px;color:var(--text2);margin-bottom:4px}

/* FORM */
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);position:sticky;top:74px}
.form-head{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.form-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.form-body{padding:16px}
.form-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--card)}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-family:var(--font);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green2)}
.field select option{background:var(--bg2)}
.field textarea{height:56px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-sep{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px}

/* DETAIL PANEL */
.detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:16px;margin-top:12px}
.detail-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.detail-row:last-child{border-bottom:none}
.detail-icon{color:var(--green3);font-size:13px;flex-shrink:0;margin-top:1px}
.detail-val{font-size:13px;color:var(--text)}
.detail-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}

.btn{font-size:12px;font-weight:500;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);cursor:pointer;height:34px;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s;text-decoration:none}
.btn:hover{background:var(--bg3);border-color:var(--border3)}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green2);border-color:var(--green2)}
.btn.danger{color:var(--red-text);border-color:transparent;background:none}
.btn.danger:hover{background:var(--red-bg);border-color:rgba(192,57,43,.3)}
.btn.sm{height:28px;padding:0 10px;font-size:11px}
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:var(--r);z-index:500;opacity:0;transition:all .2s;border:1px solid var(--border2);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(79,168,79,.4);background:rgba(79,168,79,.1)}
.toast.error{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.1)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

.footer{background:var(--navy);border-top:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:2rem}
.footer-left{font-size:11px;color:var(--text3)}
.footer-right{font-size:11px;color:var(--green3);display:flex;align-items:center;gap:5px}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .navbar{padding:0 1rem}
  .body{padding:1rem}
  .nav-title{display:none}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="https://ramassagededebris.com/wp-content/uploads/2022/12/logo-nav-2x.png" alt="JF+" class="nav-logo" onerror="this.style.display='none'">
    <div class="nav-divider"></div>
    <span class="nav-title" id="nav-title">Clients</span>
  </div>
  <div class="nav-right">
    <a href="../" class="nav-btn"><i class="ti ti-home"></i> <span id="lbl-back">Home</span></a>
    <a href="../container-tracking/" class="nav-btn"><span id="lbl-ct-nav">Containers</span></a>
    <a href="../invoicing/" class="nav-btn"><span id="lbl-inv-nav">Invoicing</span></a>
    <a href="../calendar/" class="nav-btn"><span id="lbl-cal-nav">Calendar</span></a>
    <a href="../timesheets/" class="nav-btn"><span id="lbl-ts-nav">Timesheets</span></a>
    <div style="width:1px;height:20px;background:var(--border2);flex-shrink:0"></div>

      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>

    <button class="nav-btn primary" onclick="newClient()"><i class="ti ti-plus"></i> <span id="lbl-add">Add Client</span></button>
  </div>
</nav>

<div class="body">
  <div class="stats" id="stats"></div>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <div class="toolbar">
        <div class="search-wrap">
          <i class="ti ti-search"></i>
          <input type="text" id="cl-search" oninput="renderClients()" placeholder="Search name, phone, email…">
        </div>
        <select class="filter" id="cl-filter-cat" onchange="renderClients()">
          <option value="" id="opt-all-cat">All categories</option>
        </select>
        <div class="toolbar-sep"></div>
        <button class="icon-btn" onclick="loadAll()" title="Refresh"><i class="ti ti-refresh"></i></button>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title"><i class="ti ti-user"></i> <span id="lbl-cl-title">Clients</span></span>
          <span style="font-size:11px;color:var(--text3)" id="cl-count"></span>
        </div>
        <div class="client-grid" id="client-grid">
          <div class="empty-state"><p id="cl-loading">Loading…</p></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: form + detail -->
    <div>
      <div class="form-panel">
        <div class="form-head">
          <span class="form-title"><i class="ti ti-user"></i> <span id="form-title-txt">New Client</span></span>
          <button class="btn sm danger" onclick="clearForm()"><i class="ti ti-x"></i></button>
        </div>
        <div class="form-body">
          <input type="hidden" id="f-cl-id">
          <div class="field">
            <label id="lbl-fname">Name / Company</label>
            <input type="text" id="f-name" placeholder="Jean Tremblay / ABC Inc.">
          </div>
          <div class="field-row">
            <div class="field">
              <label id="lbl-fphone">Phone</label>
              <input type="text" id="f-phone" placeholder="514 000-0000">
            </div>
            <div class="field">
              <label id="lbl-femail">Email</label>
              <input type="email" id="f-email" placeholder="client@email.com">
            </div>
          </div>
          <div class="field">
            <label id="lbl-faddr">Address</label>
            <input type="text" id="f-addr" placeholder="123 rue, Montréal, QC">
          </div>
          <div class="field">
            <label id="lbl-fcat">Category</label>
            <select id="f-cat">
              <option value="">— Select —</option>
              <option>Residential</option>
              <option>Commercial</option>
              <option>Construction</option>
              <option>Event</option>
              <option>Résidentiel</option>
              <option>Commercial</option>
              <option>Construction</option>
              <option>Événement</option>
            </select>
          </div>
        </div>
        <div class="form-foot">
          <button class="btn danger" id="f-delete-btn" style="display:none" onclick="deleteClient()"><i class="ti ti-trash"></i></button>
          <span style="flex:1"></span>
          <button class="btn" onclick="clearForm()" id="lbl-cancel">Cancel</button>
          <button class="btn primary" onclick="saveClient()"><i class="ti ti-check"></i> <span id="lbl-save">Save</span></button>
        </div>
      </div>

      <!-- Client detail -->
      <div id="client-detail" style="display:none">
        <div class="section-sep" style="margin-top:16px"><i class="ti ti-user" style="font-size:11px"></i> <span id="lbl-detail-title">Client history</span></div>
        <div class="detail-panel">
          <div id="detail-containers"></div>
          <div id="detail-invoices" style="margin-top:10px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <span class="footer-left">© Groupe JF Plus Inc. — (514) 880-1024 — info@groupejfplus.com</span>
  <span class="footer-right"><i class="ti ti-database" style="font-size:12px"></i> Supabase</span>
</footer>

<script>
const SB='https://jaxdcbmvyysuhrkhgpnv.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphemdjam12eXlzdWhya2hncG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTExODksImV4cCI6MjA5NDE4NzE4OX0.fceMVwEHiaUin2r9uY_8e0a84SG0l0aeKyfE-xYSjfI';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};

let lang=localStorage.getItem('jf_lang')||'en';
let clients=[],containers=[],invoices=[];

const T={
  en:{
    navTitle:'Clients',back:'Home',ctNav:'Containers',invNav:'Invoicing',calNav:'Calendar',tsNav:'Timesheets',
    add:'Add Client',clTitle:'Clients',newClient:'New Client',editClient:'Edit Client',
    fname:'Name / Company',fphone:'Phone',femail:'Email',faddr:'Address',fcat:'Category',
    cancel:'Cancel',save:'Save',
    statTotal:'Total Clients',statCat:'Categories',statActive:'Active rentals',
    noClients:'No clients found.',

    online:'Online',offline:'Offline',connecting:'Connecting…',

    online:'En ligne',offline:'Hors ligne',connecting:'Connexion…',
    allCat:'Toutes catégories',
    detailTitle:'Historique client',containers:'Conteneurs',invoices:'Factures',
    noContainers:'Aucun conteneur.',noInvoices:'Aucune facture.',

};
const x=()=>T[lang];

function setLang(l){
  lang=l;localStorage.setItem('jf_lang',l);
  document.getElementById('btn-fr').className='lang-btn'+(l==='fr'?' active':'');
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' active':'');

function applyLang(){
  const t=x();

  document.getElementById('opt-all-cat').textContent=t.allCat;
}

function dbStatus(s){
  const dot=document.getElementById('db-dot');
  const lbl=document.getElementById('db-label');
  const t=x();
  dot.className='db-dot'+(s==='online'?' ':s==='offline'?' err':' connecting');
  lbl.textContent=s==='online'?t.online:s==='offline'?t.offline:t.connecting;
}

async function api(method,path,body){
  const r=await fetch(SB+'/rest/v1/'+path,{
    method,headers:{...H,'Prefer':method==='POST'?'return=representation':'return=minimal'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.hint||r.status);}
  if(r.status===204||method==='DELETE'||method==='PATCH')return null;
  return r.json();
}

async function loadAll(){
  dbStatus('connecting');
  try{
    const [cl,co,inv]=await Promise.all([
      api('GET','clients?order=name.asc&select=*'),
      api('GET','containers?order=container_id.asc&select=*'),
      api('GET','invoices?order=created_at.desc&select=*'),
    ]);
    clients=cl||[];containers=co||[];invoices=inv||[];
    dbStatus('online');
    renderStats();renderClients();populateCatFilter();
  }catch(e){dbStatus('offline');toast(x().err+e.message,'error');}
}

function renderStats(){
  const t=x();
  const cats=new Set(clients.map(c=>c.reservation_category).filter(Boolean)).size;
  const active=containers.filter(c=>c.status==='Rented').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat blue"><div class="stat-label">${t.statTotal}</div><div class="stat-val blue">${clients.length}</div></div>`+
    `<div class="stat green"><div class="stat-label">${t.statCat}</div><div class="stat-val green">${cats}</div></div>`+
    `<div class="stat amber"><div class="stat-label">${t.statActive}</div><div class="stat-val amber">${active}</div></div>`;
}

function populateCatFilter(){
  const sel=document.getElementById('cl-filter-cat');
  const cur=sel.value;
  const cats=[...new Set(clients.map(c=>c.reservation_category).filter(Boolean))].sort();
  sel.innerHTML=`<option value="">${x().allCat}</option>`;
  cats.forEach(c=>sel.innerHTML+=`<option value="${c}">${c}</option>`);
  if(cur)sel.value=cur;
}

function initials(name){
  if(!name)return'?';
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}

function renderClients(){
  const t=x();
  const q=(document.getElementById('cl-search').value||'').toLowerCase();
  const fc=document.getElementById('cl-filter-cat').value;
  let list=clients.filter(c=>{
    if(fc&&c.reservation_category!==fc)return false;
    if(q&&![c.name,c.phone||'',c.email||'',c.address||''].some(v=>v.toLowerCase().includes(q)))return false;
    return true;
  });
  document.getElementById('cl-count').textContent=list.length+' client'+(list.length!==1?'s':'');
  const grid=document.getElementById('client-grid');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><p>${t.noClients}</p></div>`;
    return;
  }
  grid.innerHTML=list.map(c=>`
    <div class="client-card" onclick="selectClient(${c.id})">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="client-avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="client-name">${san(c.name)}</div>
          ${c.reservation_category?`<span class="badge cat">${san(c.reservation_category)}</span>`:''}
        </div>
      </div>
      ${c.phone?`<div class="client-meta"><i class="ti ti-phone" style="font-size:10px;color:var(--green3)"></i>${san(c.phone)}</div>`:''}
      ${c.email?`<div class="client-meta"><i class="ti ti-mail" style="font-size:10px;color:var(--green3)"></i>${san(c.email)}</div>`:''}
      ${c.address?`<div class="client-meta"><i class="ti ti-map-pin" style="font-size:10px;color:var(--green3)"></i><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${san(c.address)}</span></div>`:''}
      <div class="client-footer">
        <span style="font-size:11px;color:var(--text3)">${fmtDate(c.created_at)}</span>
        <div style="display:flex;gap:4px">
          <button class="btn sm" onclick="event.stopPropagation();editClient(${c.id})"><i class="ti ti-edit"></i></button>
          <a href="../invoicing/" class="btn sm" title="Invoice"><i class="ti ti-file-invoice"></i></a>
        </div>
      </div>
    </div>`).join('');
}

function newClient(){
  clearForm();
  document.getElementById('form-title-txt').textContent=x().newClient;
}

function selectClient(id){
  const c=clients.find(cl=>cl.id===id);
  if(!c)return;
  editClient(id);
  showDetail(c);
}

function editClient(id){
  const c=clients.find(cl=>cl.id===id);
  if(!c)return;
  document.getElementById('f-cl-id').value=c.id;
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-email').value=c.email||'';
  document.getElementById('f-addr').value=c.address||'';
  document.getElementById('f-cat').value=c.reservation_category||'';
  document.getElementById('form-title-txt').textContent=x().editClient;
  document.getElementById('f-delete-btn').style.display='flex';
}

function clearForm(){
  document.getElementById('f-cl-id').value='';
  ['f-name','f-phone','f-email','f-addr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='';
  document.getElementById('f-delete-btn').style.display='none';
  document.getElementById('form-title-txt').textContent=x().newClient;
  document.getElementById('client-detail').style.display='none';
}

function showDetail(c){
  const t=x();
  const clientContainers=containers.filter(co=>(co.client||'').toLowerCase()===c.name.toLowerCase());
  const clientInvoices=invoices.filter(i=>(i.client_name||'').toLowerCase()===c.name.toLowerCase());
  let html='';
  if(clientContainers.length){
    html+=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">${t.containers}</div>`;
    html+=clientContainers.map(co=>`
      <div class="detail-row">
        <div style="flex:1">
          <div class="detail-lbl">${co.container_id||'—'} · ${co.size||''}</div>
          <div class="detail-val">${co.address||'—'}</div>
        </div>
        <span class="badge ${co.status?co.status.toLowerCase():''}" style="font-size:10px">${co.status||''}</span>
      </div>`).join('');
  }else{
    html+=`<div style="font-size:12px;color:var(--text3);padding:4px 0">${t.noContainers}</div>`;
  }
  if(clientInvoices.length){
    html+=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 8px">${t.invoices}</div>`;
    html+=clientInvoices.map(i=>`
      <div class="detail-row">
        <div style="flex:1">
          <div class="detail-lbl">${san(i.invoice_number||'—')}</div>
          <div class="detail-val" style="color:var(--green3);font-weight:600">${fmtMoney(i.total||0)}</div>
        </div>
        <span class="badge ${i.status||''}" style="font-size:10px">${i.status||''}</span>
      </div>`).join('');
  }
  document.getElementById('detail-containers').innerHTML=html;
  document.getElementById('detail-invoices').innerHTML='';
  document.getElementById('client-detail').style.display='block';
}

async function saveClient(){
  const t=x();
  const id=document.getElementById('f-cl-id').value;
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast(lang==='fr'?'Nom requis':'Name required','error');return;}
  const body={
    name,
    phone:document.getElementById('f-phone').value.trim()||null,
    email:document.getElementById('f-email').value.trim()||null,
    address:document.getElementById('f-addr').value.trim()||null,
    reservation_category:document.getElementById('f-cat').value||null,
    updated_at:new Date().toISOString()
  };
  try{
    if(id){await api('PATCH','clients?id=eq.'+id,body);}
    else{body.created_at=new Date().toISOString();await api('POST','clients',body);}
    toast(t.saved,'success');clearForm();await loadAll();
  }catch(e){toast(t.err+e.message,'error',4000);}
}

async function deleteClient(){
  const t=x();
  const id=document.getElementById('f-cl-id').value;
  if(!id)return;
  const c=clients.find(cl=>cl.id===parseInt(id));
  if(!confirm((lang==='fr'?'Supprimer ':'Delete ')+san(c?.name||'client')+'?'))return;
  try{
    await api('DELETE','clients?id=eq.'+id);
    toast(t.deleted,'success');clearForm();await loadAll();
  }catch(e){toast(t.err+e.message,'error',4000);}
}

function san(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return'—';return String(d).slice(0,10);}
function fmtMoney(n){return'$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function toast(msg,type,dur){
  dur=dur||2500;const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',dur);
}

document.getElementById('btn-fr').className='lang-btn'+(lang==='fr'?' active':'');
document.getElementById('btn-en').className='lang-btn'+(lang==='en'?' active':'');
applyLang();loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
