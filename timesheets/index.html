<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe JF Plus — Timesheets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
.ti{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle}
.ti::before{content:'';display:block}
.ti-refresh::before{content:'↻';font-size:1.1em}
.ti-plus::before{content:'+';font-weight:700;font-size:1.1em}
.ti-database::before{content:'🗄';font-size:.85em}
.ti-home::before{content:'⌂';font-size:1em}
.ti-trash::before{content:'🗑';font-size:.85em}
.ti-check::before{content:'✓';font-weight:700;font-size:1.1em}
.ti-download::before{content:'↓';font-weight:700;font-size:1.1em}
.ti-chevron-left::before{content:'‹';font-size:1.4em;font-weight:700}
.ti-chevron-right::before{content:'›';font-size:1.4em;font-weight:700}
.ti-user::before{content:'👤';font-size:.85em}
.ti-x::before{content:'×';font-weight:700;font-size:1.2em}

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1a0f;--bg2:#162416;--bg3:#1c2e1c;--card:#192619;
  --navy:#111927;--navy2:#1a2840;
  --green:#3d8b3d;--green2:#4fa84f;--green3:#6bc46b;--green-glow:rgba(79,168,79,0.15);
  --border:rgba(79,168,79,0.12);--border2:rgba(79,168,79,0.25);--border3:rgba(79,168,79,0.4);
  --text:#e2f0e2;--text2:#8fb88f;--text3:#5a7a5a;
  --amber:#c8891a;--amber-bg:rgba(200,137,26,0.12);--amber-text:#e8a83a;
  --red:#c0392b;--red-bg:rgba(192,57,43,0.12);--red-text:#e05a4a;
  --blue:#2980b9;--blue-bg:rgba(41,128,185,0.12);--blue-text:#5aabde;
  --r:8px;--r2:12px;--r3:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.4);--shadow2:0 4px 24px rgba(0,0,0,0.5);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

.navbar{background:var(--navy);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.nav-left{display:flex;align-items:center;gap:12px;min-width:0}
.nav-logo{height:30px;filter:brightness(0) invert(1);opacity:.9;flex-shrink:0}
.nav-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.nav-title{font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;padding:5px 12px;border-radius:var(--r);height:30px;display:flex;align-items:center;gap:5px;font-family:var(--font);transition:all .15s;text-decoration:none}
.nav-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}
.nav-btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.nav-btn.primary:hover{background:var(--green2)}
.lang-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;height:30px}
.lang-btn{background:none;border:none;color:var(--text3);font-size:11px;font-weight:600;padding:0 10px;cursor:pointer;font-family:var(--font);transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);flex-shrink:0;box-shadow:0 0 6px var(--green2)}
.db-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.db-dot.connecting{background:var(--amber);animation:pulse 1s infinite}
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.icon-btn:hover{border-color:var(--green2);color:var(--green3);background:var(--green-glow)}

.body{padding:1.25rem 1.5rem;max-width:1280px;margin:0 auto}

/* WEEK SELECTOR */
.week-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px}
.week-nav-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
.week-nav-btn:hover{border-color:var(--green2);color:var(--green3)}
.week-label{font-size:13px;font-weight:600;color:var(--text);flex:1;text-align:center}
.this-week-btn{background:var(--green-glow);border:1px solid var(--border2);color:var(--green3);cursor:pointer;font-size:11px;font-weight:600;padding:0 12px;border-radius:var(--r);height:30px;font-family:var(--font);transition:all .15s}
.this-week-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.blue::before{background:var(--blue)}.stat.green::before{background:var(--green2)}.stat.amber::before{background:var(--amber)}.stat.teal::before{background:#0e9f8e}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-val.blue{color:var(--blue-text)}.stat-val.green{color:var(--green3)}.stat-val.amber{color:var(--amber-text)}.stat-val.teal{color:#2dd4bf}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* EMPLOYEE LIST */
.emp-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;position:sticky;top:74px}
.emp-head{background:var(--navy);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.emp-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.emp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.emp-item:last-child{border-bottom:none}
.emp-item:hover{background:var(--bg2)}
.emp-item.active{background:var(--green-glow);border-left:3px solid var(--green2)}
.emp-avatar{width:32px;height:32px;border-radius:50%;background:var(--green-glow);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--green3);flex-shrink:0;font-family:var(--mono)}
.emp-name{font-size:13px;font-weight:500;color:var(--text)}
.emp-role{font-size:10px;color:var(--text3);margin-top:1px}

/* TIMESHEET GRID */
.ts-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.ts-head{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ts-title{font-size:13px;font-weight:600;color:var(--text)}
.ts-actions{display:flex;gap:8px}

/* WEEK GRID */
.week-grid{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--navy);border-bottom:1px solid var(--border2)}
thead th{padding:10px 8px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
thead th.emp-col{text-align:left;padding-left:14px}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
td{padding:10px 8px;text-align:center;vertical-align:middle}
td.emp-col{text-align:left;padding-left:14px}
td.total-col{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green3)}
tfoot tr{background:var(--navy);border-top:1px solid var(--border2)}
tfoot td{padding:10px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--text2)}
tfoot td.emp-col{text-align:left;padding-left:14px;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.06em}

/* HOUR INPUT */
.hour-input{width:54px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:var(--mono);text-align:center;padding:6px 4px;border-radius:var(--r);transition:border-color .15s}
.hour-input:focus{outline:none;border-color:var(--green2)}
.hour-input::-webkit-inner-spin-button{opacity:0}

/* NOTES */
.ts-notes{padding:14px 16px;border-top:1px solid var(--border)}
.ts-notes textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 11px;border-radius:var(--r);resize:vertical;height:60px;transition:border-color .15s}
.ts-notes textarea:focus{outline:none;border-color:var(--green2)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-width:400px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow2)}
.modal-head{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.25rem}
.modal-foot{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg2)}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-family:var(--font);transition:border-color .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--green2)}
.field select option{background:var(--bg2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn{font-size:12px;font-weight:500;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--card);color:var(--text);cursor:pointer;height:34px;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s;text-decoration:none;white-space:nowrap}
.btn:hover{background:var(--bg3);border-color:var(--border3)}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green2)}
.btn.sm{height:28px;padding:0 10px;font-size:11px}
.btn.danger{color:var(--red-text);border-color:transparent;background:none}
.btn.danger:hover{background:var(--red-bg)}

.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state p{font-size:14px;color:var(--text2);margin-bottom:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:var(--r);z-index:500;opacity:0;transition:all .2s;border:1px solid var(--border2);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(79,168,79,.4);background:rgba(79,168,79,.1)}
.toast.error{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.1)}
.footer{background:var(--navy);border-top:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:2rem}
.footer-left{font-size:11px;color:var(--text3)}
.footer-right{font-size:11px;color:var(--green3);display:flex;align-items:center;gap:5px}
@media(max-width:768px){.navbar{padding:0 1rem}.body{padding:1rem}.nav-title{display:none}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="https://ramassagededebris.com/wp-content/uploads/2022/12/logo-nav-2x.png" alt="JF+" class="nav-logo" onerror="this.style.display='none'">
    <div class="nav-divider"></div>
    <span class="nav-title" id="nav-title">Timesheets</span>
  </div>
  <div class="nav-right">
    <a href="../" class="nav-btn"><i class="ti ti-home"></i> <span id="lbl-home">Home</span></a>
    <a href="../container-tracking/" class="nav-btn"><span id="lbl-ct">Containers</span></a>
    <a href="../invoicing/" class="nav-btn"><span id="lbl-inv">Invoicing</span></a>
    <a href="../calendar/" class="nav-btn"><span id="lbl-cal">Calendar</span></a>
    <div style="width:1px;height:20px;background:var(--border2)"></div>
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <span class="db-dot connecting" id="db-dot"></span>
    <span style="font-size:11px;color:var(--text3)" id="db-label"></span>
    <button class="icon-btn" onclick="loadAll()"><i class="ti ti-refresh"></i></button>
    <button class="nav-btn primary" onclick="openAddEmployee()"><i class="ti ti-plus"></i> <span id="lbl-add-emp">Add Employee</span></button>
  </div>
</nav>

<div class="body">
  <!-- WEEK SELECTOR -->
  <div class="week-bar">
    <button class="week-nav-btn" onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="week-label" id="week-label"></span>
    <button class="week-nav-btn" onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
    <button class="this-week-btn" onclick="goThisWeek()" id="lbl-this-week">This week</button>
  </div>

  <!-- STATS -->
  <div class="stats" id="stats">
    <div class="stat blue"><div class="stat-label">Employees</div><div class="stat-val blue" id="stat-emp">—</div></div>
    <div class="stat green"><div class="stat-label">Total hours</div><div class="stat-val green" id="stat-hours">—</div></div>
    <div class="stat amber"><div class="stat-label">Avg hours/day</div><div class="stat-val amber" id="stat-avg">—</div></div>
    <div class="stat teal"><div class="stat-label">Week</div><div class="stat-val teal" id="stat-week" style="font-size:16px">—</div></div>
  </div>

  <div class="layout">
    <!-- EMPLOYEE LIST -->
    <div class="emp-panel">
      <div class="emp-head">
        <span class="emp-title"><i class="ti ti-user"></i> <span id="lbl-employees">Employees</span></span>
        <button class="btn sm primary" onclick="openAddEmployee()"><i class="ti ti-plus"></i></button>
      </div>
      <div id="emp-list"><div style="padding:2rem;text-align:center;color:var(--text3);font-size:13px">Loading…</div></div>
    </div>

    <!-- TIMESHEET -->
    <div class="ts-panel">
      <div class="ts-head">
        <span class="ts-title" id="ts-title">Select an employee</span>
        <div class="ts-actions">
          <button class="btn sm" onclick="exportCSV()" id="btn-csv"><i class="ti ti-download"></i> CSV</button>
          <button class="btn sm" onclick="exportPDF()" id="btn-pdf"><i class="ti ti-download"></i> PDF</button>
          <button class="btn sm primary" onclick="saveTimesheet()" id="btn-save"><i class="ti ti-check"></i> <span id="lbl-save">Save</span></button>
        </div>
      </div>
      <div id="ts-content">
        <div class="empty-state"><p id="lbl-select-emp">Select an employee on the left to view or edit their timesheet.</p></div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <span class="footer-left">© Groupe JF Plus Inc. — (514) 880-1024 — info@groupejfplus.com</span>
  <span class="footer-right"><i class="ti ti-database" style="font-size:12px"></i> Supabase</span>
</footer>
<div class="toast" id="toast"></div>
<div id="mc"></div>

<script>
const SB='https://jaxdcbmvyysuhrkhgpnv.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphemdjam12eXlzdWhya2hncG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTExODksImV4cCI6MjA5NDE4NzE4OX0.fceMVwEHiaUin2r9uY_8e0a84SG0l0aeKyfE-xYSjfI';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY};

let lang=localStorage.getItem('jf_lang')||'en';
let employees=[],timesheets=[],selectedEmpId=null;
let weekStart=getMonday(new Date());

const T={
  en:{navTitle:'Timesheets',home:'Home',ct:'Containers',inv:'Invoicing',cal:'Calendar',
    addEmp:'Add Employee',employees:'Employees',thisWeek:'This week',
    selectEmp:'Select an employee on the left to view or edit their timesheet.',
    save:'Save',csv:'CSV',pdf:'PDF',
    days:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    total:'Total',notes:'Notes',weekOf:'Week of',
    fName:'Name',fRole:'Role',roles:['Driver','Operator','Admin','Laborer','Supervisor'],
    cancel:'Cancel',addEmpTitle:'New Employee',
    saved:'Timesheet saved ✓',empSaved:'Employee added ✓',empDeleted:'Employee deleted.',
    err:'Error: ',online:'Online',offline:'Offline',connecting:'Connecting…',
    statEmp:'Employees',statHours:'Total hours',statAvg:'Avg hours/day',statWeek:'Week',
    noEmp:'No employees yet. Add one to get started.',
  },
  fr:{navTitle:'Feuilles de temps',home:'Accueil',ct:'Conteneurs',inv:'Facturation',cal:'Calendrier',
    addEmp:'Ajouter employé',employees:'Employés',thisWeek:'Cette semaine',
    selectEmp:'Sélectionnez un employé à gauche pour voir ou modifier sa feuille de temps.',
    save:'Enregistrer',csv:'CSV',pdf:'PDF',
    days:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],
    total:'Total',notes:'Notes',weekOf:'Semaine du',
    fName:'Nom',fRole:'Rôle',roles:['Chauffeur','Opérateur','Admin','Manœuvre','Superviseur'],
    cancel:'Annuler',addEmpTitle:'Nouvel employé',
    saved:'Feuille enregistrée ✓',empSaved:'Employé ajouté ✓',empDeleted:'Employé supprimé.',
    err:'Erreur : ',online:'En ligne',offline:'Hors ligne',connecting:'Connexion…',
    statEmp:'Employés',statHours:'Total heures',statAvg:'Moy. h/jour',statWeek:'Semaine',
    noEmp:'Aucun employé. Ajoutez-en un pour commencer.',
  }
};
const x=()=>T[lang];

function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt;}
function dateStr(d){return d.toISOString().slice(0,10);}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt;}

function setLang(l){lang=l;localStorage.setItem('jf_lang',l);document.getElementById('btn-fr').className='lang-btn'+(l==='fr'?' active':'');document.getElementById('btn-en').className='lang-btn'+(l==='en'?' active':'');applyLang();renderAll();}

function applyLang(){
  const t=x();
  document.getElementById('nav-title').textContent=t.navTitle;
  document.getElementById('lbl-home').textContent=t.home;
  document.getElementById('lbl-ct').textContent=t.ct;
  document.getElementById('lbl-inv').textContent=t.inv;
  document.getElementById('lbl-cal').textContent=t.cal;
  document.getElementById('lbl-add-emp').textContent=t.addEmp;
  document.getElementById('lbl-employees').textContent=t.employees;
  document.getElementById('lbl-this-week').textContent=t.thisWeek;
  document.getElementById('lbl-save').textContent=t.save;
  document.getElementById('lbl-select-emp').textContent=t.selectEmp;
}

function dbStatus(s){
  const dot=document.getElementById('db-dot'),lbl=document.getElementById('db-label'),t=x();
  dot.className='db-dot'+(s==='online'?' ':s==='offline'?' err':' connecting');
  lbl.textContent=s==='online'?t.online:s==='offline'?t.offline:t.connecting;
}

async function api(method,path,body){
  const r=await fetch(SB+'/rest/v1/'+path,{method,headers:{...H,'Prefer':method==='POST'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.status);}
  if(r.status===204||method==='DELETE'||method==='PATCH')return null;
  return r.json();
}

async function loadAll(){
  dbStatus('connecting');
  try{
    const [em,ts]=await Promise.all([
      api('GET','employees?select=*&order=name.asc'),
      api('GET','timesheets?select=*&order=week_start.desc'),
    ]);
    employees=em||[];timesheets=ts||[];
    dbStatus('online');renderAll();
  }catch(e){dbStatus('offline');toast(x().err+e.message,'error');}
}

function renderAll(){
  applyLang();updateWeekLabel();renderStats();renderEmployees();
  if(selectedEmpId)renderTimesheet();
}

function updateWeekLabel(){
  const t=x();
  const end=addDays(weekStart,6);
  document.getElementById('week-label').textContent=t.weekOf+' '+dateStr(weekStart)+' → '+dateStr(end);
  document.getElementById('stat-week').textContent=dateStr(weekStart).slice(5);
}

function renderStats(){
  const t=x();
  const ws=dateStr(weekStart);
  const weekTs=timesheets.filter(ts=>ts.week_start===ws);
  const totalHours=weekTs.reduce((s,ts)=>(parseFloat(ts.mon)||0)+(parseFloat(ts.tue)||0)+(parseFloat(ts.wed)||0)+(parseFloat(ts.thu)||0)+(parseFloat(ts.fri)||0)+(parseFloat(ts.sat)||0)+(parseFloat(ts.sun)||0)+s,0);
  const activeDays=weekTs.reduce((s,ts)=>{let d=0;['mon','tue','wed','thu','fri','sat','sun'].forEach(day=>{if((parseFloat(ts[day])||0)>0)d++;});return s+d;},0);
  document.getElementById('stat-emp').textContent=employees.length;
  document.getElementById('stat-hours').textContent=totalHours.toFixed(1)+'h';
  document.getElementById('stat-avg').textContent=activeDays>0?(totalHours/activeDays).toFixed(1)+'h':'0h';
}

function renderEmployees(){
  const t=x();
  const el=document.getElementById('emp-list');
  if(!employees.length){el.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--text3);font-size:12px;line-height:1.6">${t.noEmp}</div>`;return;}
  el.innerHTML=employees.map(e=>`
    <div class="emp-item${selectedEmpId===e.id?' active':''}" onclick="selectEmployee(${e.id})">
      <div class="emp-avatar">${initials(e.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="emp-name">${san(e.name)}</div>
        <div class="emp-role">${san(e.role||'')}</div>
      </div>
      <button class="btn sm danger" onclick="event.stopPropagation();deleteEmployee(${e.id})" style="opacity:.5;height:24px;padding:0 6px"><i class="ti ti-trash"></i></button>
    </div>`).join('');
}

function selectEmployee(id){
  selectedEmpId=id;renderEmployees();renderTimesheet();
}

function getWeekTs(empId){
  return timesheets.find(ts=>ts.employee_id===empId&&ts.week_start===dateStr(weekStart))||null;
}

function renderTimesheet(){
  const t=x();
  const emp=employees.find(e=>e.id===selectedEmpId);
  if(!emp){document.getElementById('ts-content').innerHTML=`<div class="empty-state"><p>${t.selectEmp}</p></div>`;return;}
  document.getElementById('ts-title').textContent=san(emp.name)+' — '+san(emp.role||'');
  const ts=getWeekTs(selectedEmpId);
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  const dayLabels=t.days;
  const vals={mon:ts?.mon||0,tue:ts?.tue||0,wed:ts?.wed||0,thu:ts?.thu||0,fri:ts?.fri||0,sat:ts?.sat||0,sun:ts?.sun||0};
  const total=days.reduce((s,d)=>s+(parseFloat(vals[d])||0),0);
  // Day dates for header
  const dayDates=days.map((_,i)=>dateStr(addDays(weekStart,i)));
  document.getElementById('ts-content').innerHTML=`
    <div class="week-grid">
      <table>
        <thead>
          <tr>
            <th class="emp-col" style="width:140px">${t.weekOf}</th>
            ${dayLabels.map((d,i)=>`<th><div>${d}</div><div style="font-size:9px;color:var(--text3);font-weight:400;margin-top:2px">${dayDates[i].slice(5)}</div></th>`).join('')}
            <th>${t.total}</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="emp-col" style="font-size:13px;font-weight:500;color:var(--text)">${san(emp.name)}</td>
            ${days.map(d=>`<td><input class="hour-input" type="number" id="inp-${d}" min="0" max="24" step="0.5" value="${parseFloat(vals[d])||''}" placeholder="0" oninput="updateTotal()"></td>`).join('')}
            <td class="total-col" id="row-total">${total.toFixed(1)}h</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td class="emp-col">${lang==='fr'?'Heures / jour':'Hours / day'}</td>
            ${days.map(d=>`<td id="col-${d}">${(parseFloat(vals[d])||0).toFixed(1)}</td>`).join('')}
            <td style="color:var(--green3);font-weight:700">${total.toFixed(1)}h</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="ts-notes">
      <textarea id="ts-notes-input" placeholder="${lang==='fr'?'Notes (tâches, absences, heures supplémentaires…)':'Notes (tasks, absences, overtime…)'}">${san(ts?.notes||'')}</textarea>
    </div>`;
}

function updateTotal(){
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  let total=0;
  days.forEach(d=>{
    const v=parseFloat(document.getElementById('inp-'+d)?.value)||0;
    total+=v;
    const col=document.getElementById('col-'+d);
    if(col)col.textContent=v.toFixed(1);
  });
  const rt=document.getElementById('row-total');
  if(rt)rt.textContent=total.toFixed(1)+'h';
}

async function saveTimesheet(){
  if(!selectedEmpId){toast(lang==='fr'?'Sélectionnez un employé':'Select an employee','error');return;}
  const t=x();
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  const body={
    employee_id:selectedEmpId,
    week_start:dateStr(weekStart),
    notes:(document.getElementById('ts-notes-input')?.value||'').trim(),
    updated_at:new Date().toISOString()
  };
  days.forEach(d=>{body[d]=parseFloat(document.getElementById('inp-'+d)?.value)||0;});
  try{
    const existing=getWeekTs(selectedEmpId);
    if(existing){await api('PATCH','timesheets?id=eq.'+existing.id,body);}
    else{body.created_at=new Date().toISOString();await api('POST','timesheets',body);}
    toast(t.saved,'success');await loadAll();
  }catch(e){toast(t.err+e.message,'error',4000);}
}

function changeWeek(dir){weekStart=addDays(weekStart,dir*7);updateWeekLabel();renderStats();if(selectedEmpId)renderTimesheet();}
function goThisWeek(){weekStart=getMonday(new Date());updateWeekLabel();renderStats();if(selectedEmpId)renderTimesheet();}

function exportCSV(){
  const t=x();
  const ws=dateStr(weekStart);
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  const header=['Employee','Role',...t.days,'Total','Notes'];
  const rows=employees.map(emp=>{
    const ts=timesheets.find(ts=>ts.employee_id===emp.id&&ts.week_start===ws)||{};
    const hrs=days.map(d=>parseFloat(ts[d])||0);
    const total=hrs.reduce((s,h)=>s+h,0);
    return[emp.name,emp.role||'',...hrs.map(h=>h.toFixed(1)),total.toFixed(1),ts.notes||''];
  });
  const csv=[[...header],...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='timesheets-'+ws+'.csv';a.click();
  URL.revokeObjectURL(url);
  toast('CSV '+(lang==='fr'?'téléchargé':'downloaded')+'!','success');
}

function exportPDF(){
  const {jsPDF}=window.jspdf;
  const t=x();
  const ws=dateStr(weekStart);
  const end=dateStr(addDays(weekStart,6));
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(17,25,39);doc.rect(0,0,297,22,'F');
  doc.setFillColor(61,139,61);doc.rect(0,20,297,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(14);
  doc.text('GROUPE JF PLUS INC.',12,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(143,184,143);
  doc.text((lang==='fr'?'Feuilles de temps — Semaine du ':'Timesheets — Week of ')+ws+' → '+end,140,14,{align:'center'});
  doc.text(new Date().toLocaleDateString(lang==='fr'?'fr-CA':'en-CA'),280,14,{align:'right'});
  const days=['mon','tue','wed','thu','fri','sat','sun'];
  const rows=employees.map(emp=>{
    const ts=timesheets.find(ts=>ts.employee_id===emp.id&&ts.week_start===ws)||{};
    const hrs=days.map(d=>parseFloat(ts[d])||0);
    const total=hrs.reduce((s,h)=>s+h,0);
    return[emp.name,emp.role||'',...hrs.map(h=>h>0?h.toFixed(1):'—'),total.toFixed(1)+'h'];
  });
  doc.autoTable({
    startY:30,
    head:[['Employee','Role',...t.days,'Total']],
    body:rows,
    styles:{fontSize:9,cellPadding:3},
    headStyles:{fillColor:[61,139,61],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,250,245]},
    columnStyles:{0:{fontStyle:'bold'},8:{fontStyle:'bold',textColor:[61,139,61]}},
  });
  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150);
    doc.text(i+'/'+pages,148,205,{align:'center'});
    doc.text('© Groupe JF Plus Inc. — Confidentiel',12,205);
  }
  doc.save('timesheets-'+ws+'.pdf');
  toast('PDF '+(lang==='fr'?'téléchargé':'downloaded')+'!','success');
}

function openAddEmployee(){
  const t=x();
  document.getElementById('mc').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title"><i class="ti ti-user"></i> ${t.addEmpTitle}</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>${t.fName}</label><input id="emp-name" placeholder="Jean Tremblay" maxlength="100"></div>
        <div class="field"><label>${t.fRole}</label>
          <select id="emp-role">
            <option value="">— ${lang==='fr'?'Sélectionner':'Select'} —</option>
            ${t.roles.map(r=>`<option value="${r}">${r}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">${t.cancel}</button>
        <button class="btn primary" onclick="saveEmployee()"><i class="ti ti-check"></i> ${t.save}</button>
      </div>
    </div></div>`;
}

async function saveEmployee(){
  const t=x();
  const name=(document.getElementById('emp-name').value||'').trim();
  if(!name){toast(lang==='fr'?'Nom requis':'Name required','error');return;}
  const role=document.getElementById('emp-role').value||null;
  try{
    await api('POST','employees',{name,role,active:true,created_at:new Date().toISOString()});
    toast(t.empSaved,'success');closeModal();await loadAll();
  }catch(e){toast(t.err+e.message,'error',4000);}
}

async function deleteEmployee(id){
  const t=x();
  const emp=employees.find(e=>e.id===id);
  if(!confirm((lang==='fr'?'Supprimer ':'Delete ')+san(emp?.name||'')+'?'))return;
  try{
    await api('DELETE','employees?id=eq.'+id);
    if(selectedEmpId===id){selectedEmpId=null;document.getElementById('ts-content').innerHTML=`<div class="empty-state"><p>${t.selectEmp}</p></div>`;}
    toast(t.empDeleted,'success');await loadAll();
  }catch(e){toast(t.err+e.message,'error');}
}

function closeModal(){document.getElementById('mc').innerHTML='';}
function initials(name){if(!name)return'?';return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';}
function san(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type,dur){dur=dur||2500;const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',dur);}

document.getElementById('btn-fr').className='lang-btn'+(lang==='fr'?' active':'');
document.getElementById('btn-en').className='lang-btn'+(lang==='en'?' active':'');
applyLang();loadAll();
setInterval(loadAll,60000);
</script>
</body>
