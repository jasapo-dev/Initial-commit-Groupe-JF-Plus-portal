[project]
id = "jcrgbjckjtsjwrmgacxm"
organization_id = ""

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "https://groupejf-portal.netlify.app"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = false   # Only admin creates users — no public signup

[functions.send-alerts]
verify_jwt = false       # Called by cron (no user JWT)

[functions.generate-report]
verify_jwt = false       # Called by cron

# ── Cron Schedules ───────────────────────────────────────────
# Deploy these via: supabase functions deploy --schedule
# Or set in Supabase Dashboard → Edge Functions → Schedule

# Alert check every 15 minutes
# Schedule: */15 * * * *
# Function: send-alerts

# Daily report at 06:00 UTC
# Schedule: 0 6 * * *
# Function: generate-report
